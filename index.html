<!DOCTYPE html>
<html>
<head>
    <title>Welcome to FORSA BLUD</title>

    <script>
        let flag = 1;

        function f1() {
            alert('Terima kasih telah menggunakan FORSA BLUD');

            document.body.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; height:100vh; background:black; color:white; font-family:courier new;">
                    <h1>TERIMA KASIH</h1>
                </div>
            `;
        }

        function f() {
            let Bn = document.getElementById("Bn");

            if (flag == 1) {
                Bn.style.top = "80px";
                Bn.style.left = "100px";
                flag = 2;
            } else if (flag == 2) {
                Bn.style.top = "130px";
                Bn.style.left = "50px";
                flag = 3;
            } else {
                Bn.style.top = "0px";
                Bn.style.left = "0px";
                flag = 1;
            }
        }
    </script>
</head>

<body style="
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    color:white;
    font-family:courier new;
">

<div style="text-align:center; max-width:600px; width:90%;">

    <h1 style="color:red; font-size:40px;">
        Welcome to FORSA BLUD
    </h1>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSppiSJPs3jwUDx-9_6VP7WUoBig-6alpTCXQ&s"
         style="width:100%; max-width:350px; margin:20px 0;">

    <h2 style="font-size:24px;">Mau menggunakan aplikasi</h2>
    <h2 style="font-size:24px;">FORSA BLUD?</h2>

    <!-- Tombol Mau -->
    <div id="Bn" style="position:relative; top:0; left:0; margin-top:20px;">
        <input type="button" value="Mau"
            style="padding:10px 20px; font-size:18px; border-radius:10px; cursor:pointer;"
            onmouseover="f()" />
    </div>

    <!-- Tombol Tidak -->
    <div style="margin-top:10px;">
        <input type="button" value="Tidak"
            style="padding:10px 20px; font-size:18px; border-radius:10px; cursor:pointer;"
            onclick="f1()" />
    </div>

</div>

</body>
</html>
